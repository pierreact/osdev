name: Build and Test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nasm gcc xorriso qemu-system-x86 mtools iputils-arping tcpdump

      - name: Check for non-ASCII characters
        run: |
          # Allow specific unicode: therefore sign (e2 88 b4)
          if LC_ALL=C grep -rPn '[^\x00-\x7F]' . --include='*.c' --include='*.h' --include='*.asm' --include='*.inc' --include='*.s' --include='*.sh' --include='*.ld' --include='*.md' --include='*.ini' --include='*.yml' --include='*.json' | LC_ALL=C grep -Pv '\xe2\x88\xb4'; then
            echo "FAIL: non-ASCII characters found. Use ASCII only." >&2
            exit 1
          fi

      - name: Build
        run: scripts/compile.sh

      - name: Boot and test
        run: ./test/run_tests.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            test/serial_output.log
            test/serial_l2.log
            logs/tap0_capture.txt
            logs/tests.log
