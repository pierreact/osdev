name: Build and Test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nasm gcc xorriso qemu-system-x86 mtools iputils-arping tcpdump

      - name: Build
        run: scripts/compile.sh

      - name: Boot and test
        run: ./test/run_tests.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            test/serial_output.log
            test/serial_l2.log
            logs/tap0_capture.txt
            logs/tests.log
